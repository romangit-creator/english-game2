<!doctype html>
<html>
  <head>
    <title>Английский: Гонка</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
  </head>
  <body>
    <div class="nav">
      <a href="/">Одиночный режим</a> | <a href="/multi">Мультиплеер</a>
    </div>

    <div class="container" id="loginArea">
      <h2>Введите ваше имя:</h2>
      <input type="text" id="usernameInput" placeholder="Игрок 1" />
      <button onclick="joinGame()">Войти в игру</button>
    </div>

    <div class="container" id="gameArea" style="display: none">
      <h3 id="scoreBoard">Счет:</h3>
      <p id="roundInfo">Ожидание игроков...</p>

      <div class="word" id="currentWord">???</div>

      <input
        type="text"
        id="answerInput"
        placeholder="Напишите перевод и нажмите Enter"
        disabled
      />

      <div id="chat"></div>
    </div>

    <script>
      const socket = io();
      let myUsername = '';

      function joinGame() {
        myUsername = document.getElementById('usernameInput').value;
        if (!myUsername) return alert('Введите имя!');

        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('gameArea').style.display = 'block';

        socket.emit('join', { username: myUsername });
      }

      socket.on('message', function (data) {
        logChat(data.msg);
      });

      socket.on('new_round', function (data) {
        document.getElementById('roundInfo').innerText =
          'Раунд ' + data.round + ' из 10';
        document.getElementById('currentWord').innerText = data.word;
        let input = document.getElementById('answerInput');
        input.disabled = false;
        input.value = '';
        input.focus();
      });

      socket.on('round_winner', function (data) {
        logChat('✅ ' + data.winner + ' правильно ввел: ' + data.word);
        updateScores(data.scores);
        document.getElementById('answerInput').disabled = true;
      });

      socket.on('game_over', function (data) {
        logChat('🏆 ИГРА ОКОНЧЕНА!');
        updateScores(data.scores);
        document.getElementById('currentWord').innerText = 'Конец игры';
        document.getElementById('answerInput').disabled = true;
      });

      document
        .getElementById('answerInput')
        .addEventListener('keypress', function (event) {
          if (event.key === 'Enter') {
            socket.emit('submit_answer', {
              username: myUsername,
              answer: this.value,
            });
            this.value = '';
          }
        });

      function logChat(msg) {
        let chat = document.getElementById('chat');
        chat.innerHTML += '<p>' + msg + '</p>';
        chat.scrollTop = chat.scrollHeight;
      }

      function updateScores(scores) {
        let board = 'Счет: ';
        for (const [user, score] of Object.entries(scores)) {
          board += user + ' (' + score + ') | ';
        }
        document.getElementById('scoreBoard').innerText = board;
      }
    </script>
  </body>
</html>
